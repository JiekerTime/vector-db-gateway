port: 8526
api_key: "change-me"
log_level: "INFO"
log_dir: "logs"
state_dir: "state"

embedding:
  backend: "sentence_transformers"
  default_model: "BAAI/bge-m3"
  device: "auto"
  normalize_embeddings: true
  batch_size: 64
  warmup_enabled: true
  warmup_models: ["default"]
  warmup_devices: ["auto"]
  warmup_probe_texts: ["warmup"]

models:
  default:
    backend: "sentence_transformers"
    model_name: "BAAI/bge-m3"
    vector_size: 1024
    distance: "Cosine"
    normalize_embeddings: true
    device: "auto"
  legacy_small:
    backend: "sentence_transformers"
    model_name: "paraphrase-multilingual-MiniLM-L12-v2"
    vector_size: 384
    distance: "Cosine"
    normalize_embeddings: true
    device: "auto"

qdrant:
  url: "http://qdrant:6333"
  timeout: 20

queues:
  realtime:
    max_batch_size: 8
    max_wait_ms: 15
    max_concurrent_jobs: 1
    preferred_device: "cuda"
  interactive:
    max_batch_size: 32
    max_wait_ms: 50
    max_concurrent_jobs: 1
    preferred_device: "auto"
  batch:
    max_batch_size: 128
    max_wait_ms: 200
    max_concurrent_jobs: 1
    preferred_device: "cpu"

routing_rules:
  - caller_pattern: "realtime/*"
    queue: "realtime"
    service_priority: 0
    operation: "query"
  - caller_pattern: "interactive/*"
    queue: "interactive"
    service_priority: 1
    operation: "search"
  - caller_pattern: "batch/*"
    queue: "batch"
    service_priority: 3
    operation: "upsert"
  - caller_pattern: "*"
    queue: "interactive"
    service_priority: 1
    operation: "search"

operation_priority:
  query: 0
  search: 1
  retrieve: 1
  count: 1
  scroll: 1
  upsert: 2
  backfill: 3

fairness:
  aging_step_ms: 5000
  max_consecutive_realtime_batches: 8
  reserve_batch_share: 0.10

collections:
  knowledge_base_v2:
    vector_size: 1024
    distance: "Cosine"
    owner: "group_portrait"
    model: "default"
    query_model: "default"
    write_model: "default"
    aliases: []
    description: "Legacy dense-only knowledge collection"
  knowledge_base_v3:
    vector_size: 1024
    distance: "Cosine"
    owner: "group_portrait"
    vector_name: "dense"
    sparse_vector_name: "sparse"
    sparse_modifier: "idf"
    model: "default"
    query_model: "default"
    write_model: "default"
    aliases: []
    description: "Hybrid dense+sparse knowledge collection"
  decision_memory_v1:
    vector_size: 384
    distance: "Cosine"
    owner: "group_portrait"
    model: "legacy_small"
    query_model: "legacy_small"
    write_model: "legacy_small"
    aliases: []
    description: "Legacy decision memory collection"
  decision_memory_v2:
    vector_size: 1024
    distance: "Cosine"
    owner: "group_portrait"
    vector_name: "dense"
    model: "default"
    query_model: "default"
    write_model: "default"
    aliases: []
    description: "Gateway-managed decision memory collection"

logical_collections:
  knowledge:
    read_targets: ["knowledge_base_v2"]
    write_targets: ["knowledge_base_v2"]
    default_query_mode: "hybrid"
    alias_name: "knowledge"
    query_model: "default"
    write_model: "default"
    migration:
      next_target: "knowledge_base_v3"
      scheduler: "n8n"
      job_name: "gp-knowledge-v2-to-v3"
  decision_memory:
    read_targets: ["decision_memory_v1"]
    write_targets: ["decision_memory_v1"]
    default_query_mode: "dense"
    alias_name: "decision_memory"
    query_model: "default"
    write_model: "default"
    migration:
      next_target: "decision_memory_v2"
      scheduler: "n8n"
      job_name: "gp-decision-memory-v1-to-v2"
