port: 8526
api_key: "change-me"
log_level: "INFO"
log_dir: "logs"

embedding:
  backend: "sentence_transformers"
  default_model: "BAAI/bge-m3"
  device: "cuda"
  normalize_embeddings: true
  batch_size: 64

models:
  default:
    backend: "sentence_transformers"
    model_name: "BAAI/bge-m3"
    vector_size: 1024
    distance: "Cosine"
    normalize_embeddings: true
    device: "cuda"
  multilingual_small:
    backend: "sentence_transformers"
    model_name: "paraphrase-multilingual-MiniLM-L12-v2"
    vector_size: 384
    distance: "Cosine"
    normalize_embeddings: true
    device: "cuda"
  legacy_medium:
    backend: "sentence_transformers"
    model_name: "sentence-transformers/all-mpnet-base-v2"
    vector_size: 768
    distance: "Cosine"
    normalize_embeddings: true
    device: "cuda"

qdrant:
  url: "http://qdrant:6333"
  timeout: 20

queues:
  realtime:
    max_batch_size: 8
    max_wait_ms: 15
    max_concurrent_jobs: 1
  interactive:
    max_batch_size: 32
    max_wait_ms: 50
    max_concurrent_jobs: 1
  batch:
    max_batch_size: 128
    max_wait_ms: 200
    max_concurrent_jobs: 1

routing_rules:
  - caller_pattern: "realtime/*"
    queue: "realtime"
    service_priority: 0
    operation: "query"
  - caller_pattern: "interactive/*"
    queue: "interactive"
    service_priority: 1
    operation: "search"
  - caller_pattern: "batch/*"
    queue: "batch"
    service_priority: 3
    operation: "upsert"
  - caller_pattern: "*"
    queue: "interactive"
    service_priority: 1
    operation: "search"

operation_priority:
  query: 0
  search: 1
  count: 1
  upsert: 2
  backfill: 3

fairness:
  aging_step_ms: 5000
  max_consecutive_realtime_batches: 8
  reserve_batch_share: 0.10

collections:
  documents:
    vector_size: 1024
    distance: "Cosine"
    owner: "default"
    model: "default"
    query_model: "default"
    write_model: "default"
    aliases: ["documents_v1"]
    description: "General-purpose document collection"
  memory:
    vector_size: 384
    distance: "Cosine"
    owner: "default"
    model: "multilingual_small"
    query_model: "multilingual_small"
    write_model: "multilingual_small"
    aliases: ["memory_v1"]
    description: "Short-form semantic memory collection"
  archive:
    vector_size: 768
    distance: "Cosine"
    owner: "default"
    model: "legacy_medium"
    query_model: "legacy_medium"
    write_model: "legacy_medium"
    aliases: ["archive_v1"]
    description: "Legacy embedding footprint"
